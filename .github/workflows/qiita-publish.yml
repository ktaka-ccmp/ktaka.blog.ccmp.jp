name: Publish to Qiita

on:
  push:
    branches: [master]
    paths:
      - 'qiita/public/*.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and run Qiita CLI
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: |
          npm install -g @qiita/qiita-cli@v1.8.0
          qiita publish --all --root qiita

      - name: Create PR for Qiita metadata updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add qiita/public/*.md
          if git diff --cached --quiet; then
            echo "No metadata changes to commit"
            exit 0
          fi
          branch="qiita-metadata-update-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "${branch}"
          git commit -m "Update Qiita article metadata (id, updated_at)"
          git push origin "${branch}"
          gh pr create \
            --title "Update Qiita article metadata" \
            --body "Qiita CLI が投稿後に書き戻した id と updated_at を反映するための自動 PR です。" \
            --base dev \
            --head "${branch}"
