name: Publish to dev.to

on:
  push:
    branches: [master]
    paths:
      - 'docs/*-devto/*.md'
  workflow_dispatch:
    inputs:
      file:
        description: 'Markdown file path (e.g. docs/WebCryptoEcdsaEn-devto/dev-to-webcrypto-ecdsa.md)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect articles to publish
        id: collect
        env:
          MANUAL_FILE: ${{ github.event.inputs.file }}
        run: |
          if [ -n "${MANUAL_FILE}" ]; then
            echo "files=${MANUAL_FILE}" >> "$GITHUB_OUTPUT"
          else
            files=$(git diff --name-only HEAD~1 HEAD -- 'docs/*-devto/*.md' | tr '\n' ' ')
            echo "files=${files}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish articles
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          FILES: ${{ steps.collect.outputs.files }}
        run: |
          if [ -z "${FILES}" ]; then
            echo "No articles to publish"
            exit 0
          fi

          for file in ${FILES}; do
            if [ ! -f "${file}" ]; then
              echo "File not found: ${file}"
              continue
            fi

            echo "Publishing: ${file}"
            content=$(cat "${file}" | jq -Rs .)

            response=$(curl -s -w "\n%{http_code}" -X POST https://dev.to/api/articles \
              -H "Content-Type: application/json" \
              -H "api-key: ${DEVTO_API_KEY}" \
              -d "{\"article\": {\"body_markdown\": ${content}}}")

            http_code=$(echo "${response}" | tail -1)
            body=$(echo "${response}" | sed '$d')

            if [ "${http_code}" = "201" ]; then
              url=$(echo "${body}" | jq -r '.url')
              echo "Published: ${url}"
            else
              echo "Failed (HTTP ${http_code}): ${body}"
              exit 1
            fi
          done
