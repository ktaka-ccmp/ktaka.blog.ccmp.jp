<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <link rel="alternate" type="application/atom+xml" title="{{ config.title }}" href="/atom.xml">
  <link rel="stylesheet" href="/github-markdown.css">
  <style>
    body {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .markdown-body {
      padding: 20px 0;
    }
    .site-nav {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      font-size: 1.5em;
    }
    .site-nav a {
      text-decoration: none;
      color: #0366d6;
    }
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .lightbox:target {
      display: flex;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
    }
    .lightbox .close {
      position: fixed;
      top: 15px; right: 20px;
      color: #fff;
      font-size: 2em;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <nav class="site-nav" style="display: flex; align-items: center;">
    <a href="/">{{ config.title }}</a>
    <a href="/p/p.html" style="margin-left: 20px;">Profile</a>
    <a href="/atom.xml" style="margin-left: 20px;" title="Atom Feed"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="6.18" cy="17.82" r="2.18"/><path d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83c0-8.59-6.97-15.56-15.56-15.56zm0 5.66v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83c0-5.47-4.43-9.9-9.9-9.9z"/></svg></a>
    {% block nav_extra %}{% endblock %}
  </nav>
  <main class="markdown-body">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
