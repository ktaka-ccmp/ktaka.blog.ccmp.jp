{% extends "base.html" %}

{% block title %}{{ section.title }} | {{ config.title }}{% endblock %}

{% block content %}
<h1>{{ section.title }}</h1>

{% for page in section.pages %}
<article>
  <h2><a href="{{ page.permalink | trim_end_matches(pat='/') }}">{{ page.title }}</a></h2>
  <time>{{ page.date | date(format="%Y-%m-%d") }}</time>
</article>
{% endfor %}
{% endblock %}
